<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — CryptoDash Premium</title>
    <style>
      :root {
        --bg-base: #080b14;
        --bg-card: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --accent-from: #6366f1;
        --accent-to: #06b6d4;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-base);
        color: var(--text-primary);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-image:
          radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, rgba(6, 182, 212, 0.04) 0%, transparent 50%);
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 16px;
        padding: 2.5rem;
        text-align: center;
        max-width: 400px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem 0;
        font-weight: 700;
      }
      p {
        color: var(--text-secondary);
        font-size: 0.9rem;
        line-height: 1.5;
        margin: 0 0 1.5rem 0;
      }
      .btn {
        background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
        border: none;
        border-radius: 8px;
        color: white;
        padding: 0.6rem 1.5rem;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: opacity 0.2s;
      }
      .btn:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">⚡</div>
      <h1>You are offline</h1>
      <p>
        CryptoDash requires an active internet connection to stream live cryptocurrency market data.
      </p>
      <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    </div>
  </body>
</html>
